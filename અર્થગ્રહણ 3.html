        function loadQuestion() {
            nextBtn.style.display = "none";
            feedbackMsg.innerHTML = "";
            optionsContainer.innerHTML = "";
            
            let qData = data[currentQuestionIndex];
            currentQDisplay.innerText = currentQuestionIndex + 1;
            
            paraText.innerText = qData.para;
            questionText.innerText = "પ્રશ્ન: " + qData.question;

            qData.options.forEach((opt, index) => {
                let btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

            let qData = data[currentQuestionIndex];
            let buttons = document.querySelectorAll(".option-btn");
            
            buttons.forEach(b => b.disabled = true);

            if (selectedIndex === qData.answer) {
                btn.classList.add("correct");
                feedbackMsg.innerText = "✓ સાચો જવાબ! ખૂબ સરસ.";
                feedbackMsg.style.color = "#28a745";
                score++;
                scoreDisplay.innerText = score;

                btn.classList.add("wrong");
                buttons[qData.answer].classList.add("correct"); 
                feedbackMsg.innerText = "✗ ખોટો જવાબ. ફરી પ્રયત્ન કરજો.";
                feedbackMsg.style.color = "#dc3545";
            }

            nextBtn.style.display = "block";
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < data.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            quizContainer.style.display = "none";
            resultContainer.style.display = "block";
            finalScoreDisplay.innerText = score;
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            scoreDisplay.innerText = score;
            quizContainer.style.display = "block";
            resultContainer.style.display = "none";
            loadQuestion();
        }

        window.onload = loadQuestion;

    </script>
</body>
</html>
