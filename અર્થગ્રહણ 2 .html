            },
            {
                para: "પ્રામાણિકતા એ શ્રેષ્ઠ નીતિ છે. સાચું બોલનાર વ્યક્તિ ક્યારેય ડરતો નથી. ભલે ગમે તેવી મુશ્કેલી આવે, આપણે હંમેશા સત્યનો સાથ આપવો જોઈએ.",
                question: "શ્રેષ્ઠ નીતિ કઈ છે?",
                options: ["ખોટું બોલવું", "ચોરી કરવી", "પ્રામાણિકતા", "ડરવું"],
                answer: 2
            },
            {
                para: "સાચો મિત્ર એ છે જે મુશ્કેલીના સમયે આપણી મદદ કરે. કૃષ્ણ અને સુદામાની મિત્રતા વિશ્વમાં પ્રખ્યાત છે. મિત્રતામાં સ્વાર્થ ન હોવો જોઈએ.",
                question: "સાચો મિત્ર ક્યારે મદદ કરે છે?",
                options: ["માત્ર ખુશીમાં", "મુશ્કેલીના સમયે", "જ્યારે પૈસા હોય ત્યારે", "પરીક્ષામાં"],
                answer: 1
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        const paraText = document.getElementById("paragraph-text");
        const questionText = document.getElementById("question-text");
        const optionsContainer = document.getElementById("options");
        const nextBtn = document.getElementById("next-btn");
        const feedbackMsg = document.getElementById("feedback-msg");
        const currentQDisplay = document.getElementById("current-q");
        const scoreDisplay = document.getElementById("score");
        const quizContainer = document.getElementById("quiz-container");
        const resultContainer = document.getElementById("result-container");
        const finalScoreDisplay = document.getElementById("final-score");

        function loadQuestion() {
            // Reset UI for new question
            nextBtn.style.display = "none";
            feedbackMsg.innerHTML = "";
            optionsContainer.innerHTML = "";
            
            let qData = data[currentQuestionIndex];
            currentQDisplay.innerText = currentQuestionIndex + 1;
            
            paraText.innerText = qData.para;
            questionText.innerText = "પ્રશ્ન: " + qData.question;

            qData.options.forEach((opt, index) => {
                let btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, btn) {
            let qData = data[currentQuestionIndex];
            let buttons = document.querySelectorAll(".option-btn");
            
            // Disable all buttons
            buttons.forEach(b => b.disabled = true);

            if (selectedIndex === qData.answer) {
                btn.classList.add("correct");
                feedbackMsg.innerText = "✓ સાચો જવાબ!";
                feedbackMsg.style.color = "#28a745";
                score++;
                scoreDisplay.innerText = score;
            } else {
                btn.classList.add("wrong");
                buttons[qData.answer].classList.add("correct"); // Highlight correct answer
                feedbackMsg.innerText = "✗ ખોટો જવાબ!";
                feedbackMsg.style.color = "#dc3545";
            }

            nextBtn.style.display = "block";
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < data.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            quizContainer.style.display = "none";
            resultContainer.style.display = "block";
            finalScoreDisplay.innerText = score;
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            scoreDisplay.innerText = score;
            quizContainer.style.display = "block";
            resultContainer.style.display = "none";
            loadQuestion();
        }

        // Load first question on start
        window.onload = loadQuestion;

    </script>
</body>
</html>
